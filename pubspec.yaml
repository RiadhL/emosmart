name: emosmart
description: "EmoSmart - Emotion learning app for autistic children"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_database: ^11.3.4

  # Camera
  camera: ^0.11.1

  # Charts
  fl_chart: ^0.70.2

  # Audio
  audioplayers: ^6.4.0

  # Animations
  lottie: ^3.3.1

  # ML Kit face detection (on-device, no API key)
  google_mlkit_face_detection: ^0.11.0

  # Runtime permissions
  permission_handler: ^11.3.1

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  image: ^4.1.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#5B4FCF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/Mood Match/easy/
    - assets/images/Mood Match/medium/
    - assets/images/Mood Match/hard/
    - assets/audio/
    - assets/sounds/
    - assets/google_fonts/
